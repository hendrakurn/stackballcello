[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.23"
optimizer = true
optimizer_runs = 200
gas_reports = ["StackBallGame"]
fs_permissions = [{ access = "write", path = "./abi" }]

[rpc_endpoints]
celo_mainnet = "${CELO_MAINNET_RPC_URL}"
celo_testnet = "https://alfajores-forno.celo-testnet.org"
celo_sepolia = "https://forno.celo-sepolia.celo-testnet.org"

[etherscan]
celo_mainnet = { key = "${CELOSCAN_API_KEY}", url = "https://api.celoscan.io/api" }
celo_testnet = { key = "${CELOSCAN_API_KEY}", url = "https://api-alfajores.celoscan.io/api" }

